syntax = "proto3";

package chat;
option java_package = "com.chat.proto";
option java_outer_classname = "ChatProtos";

message Message {
    string timestamp = 1;
    string sender = 2;
    
    enum Type {
        UNKNOWN = 0;
        LOGIN_REQ = 1;
        LOGIN_REP = 2;
        CREATE_CHANNEL_REQ = 3;
        CREATE_CHANNEL_REP = 4;
        LIST_CHANNELS_REQ = 5;
        LIST_CHANNELS_REP = 6;
        REPLICATE_CHANNEL_EVENT = 7;
        PUBLISH_MESSAGE_REQ = 8;
        PUBLISH_MESSAGE_REP = 9;
        CHANNEL_MESSAGE_EVENT = 10;
    }
    Type type = 3;

    message LoginRequest {
        string username = 1;
    }

    message LoginResponse {
        bool success = 1;
        string error_message = 2;
    }

    message CreateChannelRequest {
        string channel_name = 1;
    }

    message CreateChannelResponse {
        bool success = 1;
        string error_message = 2;
    }

    message ListChannelsRequest {
    }

    message ListChannelsResponse {
        repeated string channels = 1;
    }

    message ReplicateChannelEvent {
        string channel_name = 1;
        string source_server_id = 2;
    }

    message PublishMessageRequest {
        string channel_name = 1;
        string text = 2;
    }

    message PublishMessageResponse {
        bool success = 1;
        string error_message = 2;
    }

    message ChannelMessageEvent {
        string channel_name = 1;
        string text = 2;
        string sender = 3;
    }

    oneof payload {
        LoginRequest login_req = 4;
        LoginResponse login_rep = 5;
        CreateChannelRequest create_req = 6;
        CreateChannelResponse create_rep = 7;
        ListChannelsRequest list_req = 8;
        ListChannelsResponse list_rep = 9;
        ReplicateChannelEvent replicate_event = 10;
        PublishMessageRequest pub_req = 11;
        PublishMessageResponse pub_rep = 12;
        ChannelMessageEvent channel_event = 13;
    }
}
