version: '3.8'

services:
  broker:
    build:
      context: .
      dockerfile: broker/Dockerfile
    environment:
      - MODE=REQ_REP
    ports:
      - "5555:5555"
      - "5556:5556"

  pubsub:
    build:
      context: .
      dockerfile: broker/Dockerfile
    environment:
      - MODE=PUB_SUB
    ports:
      - "5557:5557"
      - "5558:5558"

  reference:
    build:
      context: .
      dockerfile: reference/Dockerfile
    ports:
      - "5560:5560"

  server1:
    build:
      context: .
      dockerfile: server-python/Dockerfile
    environment:
      - SERVER_NAME=srv1
      - BROKER_URL=tcp://broker:5556
      - PUB_URL=tcp://pubsub:5557
      - SUB_URL=tcp://pubsub:5558
      - REFERENCE_URL=tcp://reference:5560
      - DATA_FILE=/data/state.json
    volumes:
      - server1_data:/data
    depends_on:
      - broker
      - pubsub
      - reference

  server2:
    build:
      context: .
      dockerfile: server-python/Dockerfile
    environment:
      - SERVER_NAME=srv2
      - BROKER_URL=tcp://broker:5556
      - PUB_URL=tcp://pubsub:5557
      - SUB_URL=tcp://pubsub:5558
      - REFERENCE_URL=tcp://reference:5560
      - DATA_FILE=/data/state.json
    volumes:
      - server2_data:/data
    depends_on:
      - broker
      - pubsub
      - reference

  client_alfa:
    build:
      context: .
      dockerfile: client-java/Dockerfile
    environment:
      - BOT_NAME=bot_alfa
      - BROKER_URL=tcp://broker:5555
      - PUBSUB_URL=tcp://pubsub:5558
    depends_on:
      - server1
      - server2

  client_beta:
    build:
      context: .
      dockerfile: client-java/Dockerfile
    environment:
      - BOT_NAME=bot_beta
      - BROKER_URL=tcp://broker:5555
      - PUBSUB_URL=tcp://pubsub:5558
    depends_on:
      - server1
      - server2

volumes:
  server1_data:
  server2_data:
